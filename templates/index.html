<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #0077ff;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005edb;
        }

        .result {
            margin-top: 30px;
            background: #eef5ff;
            padding: 20px;
            border-radius: 8px;
        }

        ul {
            padding-left: 20px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Martin's AI Resume Analyzer</h1>

        <form method="POST">

            <textarea
                name="resume"
                placeholder="Paste your resume text here..."
                required
            ></textarea>

            <br>

            <button type="submit">
                Analyze Resume
            </button>

        </form>

        {% if result %}

        <div class="result">

            <h2>Analysis Result</h2>

            <p>
                <strong>Resume Score:</strong>
                {{ result.score }}/100
            </p>

            <p>
                <strong>Sentiment Score:</strong>
                {{ result.sentiment }}
            </p>

            <h3>Detected Skills:</h3>

            <ul>
                {% for skill in result.keywords %}
                    <li>{{ skill }}</li>
                {% endfor %}
            </ul>

        </div>

        {% endif %}

    </div>

</body>
</html>
